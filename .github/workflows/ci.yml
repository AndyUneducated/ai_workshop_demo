name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      EVALS_OLLAMA_BASE_URL: http://127.0.0.1:11434
      OLLAMA_HOST: http://127.0.0.1:11434
      # GHA runners lack RAM for 32b; 7b keeps live judge / traj tests runnable.
      EVALS_TEST_OLLAMA_MODEL: qwen2.5:7b
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      TRANSFORMERS_CACHE: ${{ github.workspace }}/.cache/huggingface

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Cache Hugging Face
        uses: actions/cache@v4
        with:
          path: .cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('play/rag/config.py', 'requirements-ci.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull models
        run: |
          ollama serve &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:11434/api/tags >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:11434/api/tags
          ollama pull qwen2.5:7b
          ollama pull qwen3-embedding:8b

      - name: Build RAG VDB fixtures
        working-directory: play/rag
        run: |
          python ingest.py --docs docs/test_vdb --output vdb/test_vdb
          python ingest.py --docs docs/panel --output vdb/panel

      - name: Run full test suite
        run: python -m pytest -v --tb=short
